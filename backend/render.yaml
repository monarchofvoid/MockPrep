services:
  - type: web
    name: vyas-api
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port ${PORT}"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: vyas-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        value: "https://mock-prep-three.vercel.app"
      - key: QB_ROOT
        value: "../question_bank"

databases:
  - name: vyas-db
    plan: free
