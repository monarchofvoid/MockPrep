services:
  - type: web
    name: vyas-api
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port ${PORT}"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: vyas-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        value: "https://mock-prep-three.vercel.app"
      - key: QB_ROOT
        value: "../question_bank"
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: "openai/gpt-oss-120b"
      - key: GROQ_BASE_URL
        value: "https://api.groq.com/openai/v1"
      - key: AI_TIMEOUT
        value: "50.0"
      - key: AI_MAX_RETRIES
        value: "2"
      - key: AI_TEMPERATURE_MOCK
        value: "0.5"
      - key: AI_TEMPERATURE_TUTOR
        value: "0.3"
      - key: AI_MAX_TOKENS_MOCK
        value: "8192"
      - key: AI_MAX_TOKENS_TUTOR
        value: "2048"

databases:
  - name: vyas-db
    plan: free
