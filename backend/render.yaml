# ════════════════════════════════════════════════════════════════════════════
# VYAS v2.2.0 — Render Blueprint
# ════════════════════════════════════════════════════════════════════════════
#
# v2.2.0 changes vs v2.1.x:
#   - Removed: vyas-celery-worker service (Celery → APScheduler migration)
#   - Removed: vyas-celery-beat service  (scheduler now runs inside vyas-api)
#   - Removed: CELERY_BROKER_URL / CELERY_RESULT_BACKEND env vars
#   - Added:   SCHEDULER_ENABLED env var
#
# Architecture is now a single web service:
#   vyas-api  →  FastAPI + APScheduler (runs scheduled jobs in-process)
#
# ── DATABASE NOTE ────────────────────────────────────────────────────────────
#
# render.yaml uses Render's managed PostgreSQL via `fromDatabase: connectionString`.
# This provides a DIRECT connection — NOT through pgBouncer.
#
# ── REDIS SETUP (READ BEFORE DEPLOYING) ─────────────────────────────────────
#
# Render's managed Redis requires a paid plan. This blueprint uses Upstash Redis.
#   1. Go to https://console.upstash.com
#   2. Create a Redis database (region: Singapore — matches vyas-api region)
#   3. Copy the "Redis URL" (starts with rediss://)
#   4. Set REDIS_URL in the Render dashboard for vyas-api.
#
# ── CORS NOTE ────────────────────────────────────────────────────────────────
#
# ALLOWED_ORIGINS controls which frontend origins can call the API.
# Current value covers the production custom domain only.
#
# If you see OPTIONS 400 logs (CORS preflight rejected), it means a request
# is arriving from an origin NOT in this list. Common causes:
#   - Frontend deployed at a Vercel/Render preview URL (not the custom domain)
#   - Local dev frontend hitting the production backend
#
# Fix: add the missing origin (comma-separated) in the Render dashboard:
#   Environment → ALLOWED_ORIGINS → append ,https://your-preview-url.vercel.app
#
# ════════════════════════════════════════════════════════════════════════════

services:

  # ── Web API (single service — FastAPI + APScheduler) ─────────────────────
  - type: web
    name: vyas-api
    env: python
    region: singapore
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port ${PORT}"
    envVars:
      - key: ENVIRONMENT
        value: production

      # ── Scheduler ────────────────────────────────────────────────────────
      # APScheduler runs inside the web process (no separate worker needed).
      # Set to false if you ever need to disable background jobs temporarily.
      - key: SCHEDULER_ENABLED
        value: "true"

      # ── Security ─────────────────────────────────────────────────────────
      - key: SECRET_KEY
        generateValue: true
      - key: REFRESH_SECRET_KEY
        generateValue: true
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "15"
      - key: REFRESH_TOKEN_COOKIE_SECURE
        value: "true"
      - key: REFRESH_TOKEN_COOKIE_SAMESITE
        value: "none"

      # ── Database ──────────────────────────────────────────────────────────
      - key: DATABASE_URL
        fromDatabase:
          name: vyas-db
          property: connectionString

      # ── Redis ─────────────────────────────────────────────────────────────
      # Set manually in Render dashboard after deploying.
      # Value: rediss://... from Upstash console.
      - key: REDIS_URL
        sync: false

      # ── CORS ─────────────────────────────────────────────────────────────
      # If frontend is also deployed at a Render/Vercel preview URL,
      # add it here via the dashboard (not this file) to avoid committing URLs.
      - key: ALLOWED_ORIGINS
        value: "https://vyasmock.online,https://www.vyasmock.online"

      # ── Question Bank ─────────────────────────────────────────────────────
      - key: QB_ROOT
        value: "../question_bank"

      # ── Groq / AI ─────────────────────────────────────────────────────────
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: "llama-3.3-70b-versatile"
      - key: GROQ_BASE_URL
        value: "https://api.groq.com/openai/v1"
      - key: GROQ_TPM_LIMIT
        value: "8000"

      # ── AI Tuning ─────────────────────────────────────────────────────────
      - key: AI_TIMEOUT
        value: "60.0"
      - key: AI_MAX_RETRIES
        value: "3"
      - key: AI_TEMPERATURE_MOCK
        value: "0.5"
      - key: AI_TEMPERATURE_TUTOR
        value: "0.3"
      - key: AI_MAX_TOKENS_MOCK
        value: "7500"
      - key: AI_MAX_TOKENS_TUTOR
        value: "2048"
      - key: AI_MOCK_BATCH_SIZE
        value: "4"
      - key: AI_BATCH_DELAY
        value: "42.0"
      - key: AI_RATE_LIMIT_BACKOFF
        value: "30.0"
      - key: AI_TOKEN_SAFETY_MARGIN
        value: "0.80"
      - key: AI_TOKENS_PER_QUESTION
        value: "1400"
      - key: AI_OUTPUT_TOKEN_OVERHEAD
        value: "1.20"
      - key: AI_PROMPT_TOKEN_ESTIMATE
        value: "262"

      # ── Wallet / Credits ──────────────────────────────────────────────────
      - key: SIGNUP_BONUS_MICROCREDITS
        value: "500"
      - key: MICROCREDITS_PER_CREDIT
        value: "100"
      - key: COST_PER_QUESTION_MICROCREDITS
        value: "15"
      - key: LOW_CREDIT_WARN_MICROCREDITS
        value: "150"
      - key: COST_TUTOR_EXPLAIN_MICROCREDITS
        value: "50"

      # ── Razorpay ──────────────────────────────────────────────────────────
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: RAZORPAY_CURRENCY
        value: "INR"

      # ── Email ─────────────────────────────────────────────────────────────
      - key: BREVO_API_KEY
        sync: false
      - key: FROM_EMAIL
        sync: false
      - key: FRONTEND_URL
        value: "https://vyasmock.online"
      - key: OWNER_EMAIL
        sync: false

      # ── Sentry (optional) ─────────────────────────────────────────────────
      - key: SENTRY_DSN
        sync: false
      - key: SENTRY_TRACES_SAMPLE_RATE
        value: "0.1"

      # ── Logging ───────────────────────────────────────────────────────────
      - key: LOG_LEVEL
        value: "INFO"
      - key: LOG_FORMAT
        value: "json"
      # LOG_FILE intentionally omitted — stdout only on Render (no persistent disk)

      # ── Google OAuth ──────────────────────────────────────────────────────
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        value: "https://vyasmock.online/auth/oauth/google/callback"

databases:
  - name: vyas-db
    plan: free
    region: singapore

# ── DEPLOYMENT CHECKLIST ─────────────────────────────────────────────────────
#
# Before hitting "Apply Blueprint":
#
#  1. Create Upstash Redis (free): https://console.upstash.com
#     Region: ap-southeast-1 (Singapore — same as vyas-api)
#
#  2. After blueprint deploys, set these manually in Render dashboard
#     (vyas-api → Environment):
#       REDIS_URL             = rediss://...  (from Upstash)
#       GROQ_API_KEY          = gsk_...
#       RAZORPAY_KEY_ID       = rzp_live_...
#       RAZORPAY_KEY_SECRET   = ...
#       RAZORPAY_WEBHOOK_SECRET = ...
#       BREVO_API_KEY         = ...
#       FROM_EMAIL            = support@vyasmock.online
#       OWNER_EMAIL           = support@vyasmock.online
#       GOOGLE_CLIENT_ID      = ...
#       GOOGLE_CLIENT_SECRET  = ...
#
#  3. Run migrations (Render dashboard → vyas-api → Shell):
#       alembic upgrade head
#
#  4. Verify: https://vyas-api.onrender.com/health
#     Expected: {"status":"healthy","redis":"ok","version":"2.2.0"}
#
#  5. Verify: https://vyas-api.onrender.com/
#     Expected: {"service":"VYAS","version":"2.2.0","status":"ok"}
#
#  6. If you see OPTIONS 400 logs, check ALLOWED_ORIGINS in the dashboard
#     and add the missing frontend origin. See CORS NOTE above.
# ─────────────────────────────────────────────────────────────────────────────